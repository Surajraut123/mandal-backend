name: Deploy to AWS EC2

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app/backend
            git pull origin main
            npm install

            # Recreate .env from GitHub Secrets
            cat > .env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_DATABASE_URL=${{ secrets.DIRECT_DATABASE_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GROQ_OPENAI_BASE_URL=${{ secrets.GROQ_OPENAI_BASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            EOF

            pm2 restart mandal-backend --update-env

      - name: Notify Google Chat - Success
        if: success()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "✅ *AWS Backend Deplyed Successful!*\n Branch: `main`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'
      
      - name: Notify Google Chat - Failed
        if: failure()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "❌ *AWS Backend Deploy Failed!*\n Branch: `main`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'